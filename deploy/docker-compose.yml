services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: makebook
      POSTGRES_PASSWORD: makebook
      POSTGRES_DB: makebook
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U makebook"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  gitea:
    image: gitea/gitea:1.22
    environment:
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: postgres:5432
      GITEA__database__NAME: gitea
      GITEA__database__USER: makebook
      GITEA__database__PASSWD: makebook
      GITEA__server__ROOT_URL: http://localhost:3001
      GITEA__server__HTTP_PORT: "3001"
      GITEA__service__DISABLE_REGISTRATION: "false"
      GITEA__api__ENABLE_SWAGGER: "true"
    ports:
      - "3001:3001"
      - "2222:22"
    volumes:
      - gitea_data:/data
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  gitea_data:
