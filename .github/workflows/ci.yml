name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Install web dependencies
        run: cd apps/web && bun install --frozen-lockfile

      - name: Lint (API + packages)
        run: bun run lint

      - name: Lint (web)
        run: bun run lint:web

      - name: Typecheck (root)
        run: bun run typecheck

      - name: Typecheck (build)
        run: bun run build

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests with coverage
        run: bun test --coverage

      - name: Check coverage threshold (95%)
        run: bash scripts/check-coverage.sh 95

  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run quality gates
        run: bash scripts/quality-gates.sh

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install web dependencies
        run: cd apps/web && bun install --frozen-lockfile

      - name: Build Next.js
        run: cd apps/web && bun run build

  file-checks:
    name: File & Convention Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: No files over 500 lines
        run: |
          violations=""
          while IFS= read -r file; do
            lines=$(grep -c '' "$file" 2>/dev/null || echo 0)
            if [ "$lines" -gt 500 ]; then
              echo "FAIL: $file has $lines lines (max 500)"
              violations="yes"
            fi
          done < <(find apps packages -name '*.ts' -o -name '*.tsx' | grep -v node_modules | grep -v .next | grep -v dist)
          if [ -n "$violations" ]; then
            exit 1
          fi
          echo "All files under 500 lines"

      - name: No __tests__ directories
        run: |
          if find apps packages -type d -name '__tests__' | grep -q .; then
            echo "FAIL: __tests__ directories found — tests must be colocated"
            find apps packages -type d -name '__tests__'
            exit 1
          fi
          echo "No __tests__ directories found"

      - name: No console.log in source
        run: |
          if grep -rn 'console\.\(log\|debug\|warn\|info\)' apps/api/src packages/*/src --include='*.ts' --include='*.tsx' | grep -v '\.test\.' | grep -v node_modules; then
            echo "FAIL: console.* found in source files"
            exit 1
          fi
          echo "No console.log in source"

      - name: No any types
        run: |
          if grep -rn ': any\b\|as any\b\|<any>' apps/api/src packages/*/src --include='*.ts' --include='*.tsx' | grep -v '\.test\.' | grep -v node_modules | grep -v '\.d\.ts'; then
            echo "FAIL: 'any' type found in source files"
            exit 1
          fi
          echo "No any types found"
