pre-commit:
  parallel: true
  commands:
    no-commit-to-main:
      run: |
        branch=$(git rev-parse --abbrev-ref HEAD)
        if [ "$branch" = "main" ] || [ "$branch" = "master" ]; then
          echo "Direct commits to $branch are not allowed. Create a feature branch."
          exit 1
        fi
    no-conflict-markers:
      run: |
        staged=$(git diff --cached --diff-filter=ACM -U0 -- '*.ts' '*.tsx')
        if echo "$staged" | grep -q '^+<<<<<<<'; then
          echo "Unresolved merge conflict markers found in staged files."
          exit 1
        fi
        if echo "$staged" | grep -q '^+======='; then
          echo "Unresolved merge conflict markers found in staged files."
          exit 1
        fi
        if echo "$staged" | grep -q '^+>>>>>>>'; then
          echo "Unresolved merge conflict markers found in staged files."
          exit 1
        fi
    colocated-tests:
      run: |
        if git diff --cached --diff-filter=AMR --name-only | grep -qE '(^|/)__tests__/'; then
          echo "Tests must be colocated with source files, not in __tests__/ directories."
          echo "Place test.ts files next to the source they test (e.g. foo.test.ts beside foo.ts)."
          git diff --cached --diff-filter=AMR --name-only | grep -E '(^|/)__tests__/'
          exit 1
        fi
    test-file-required:
      run: bash scripts/check-test-files.sh
    no-console-log:
      run: |
        added=$(git diff --cached --diff-filter=ACM -U0 -- '*.ts' '*.tsx' | grep '^+' | grep -v '^+++')
        if echo "$added" | grep -Eq 'console\.(log|debug|warn|info)'; then
          echo "console.* found in staged changes. Use structured logging instead."
          echo "$added" | grep -En 'console\.(log|debug|warn|info)'
          exit 1
        fi
    lint:
      run: bun run lint
    typecheck:
      run: bun run typecheck
    test:
      run: bun run test

pre-push:
  parallel: true
  commands:
    lint:
      run: bun run lint
    typecheck:
      run: bun run typecheck
    build:
      run: bun run build
    quality-gates:
      run: bun run quality:gates
    test-and-coverage:
      run: |
        output=$(bun test --coverage 2>&1)
        echo "$output"
        all_files_line=$(echo "$output" | grep '^All files')
        if [ -z "$all_files_line" ]; then
          echo "Could not parse coverage output."
          exit 1
        fi
        header_line=$(echo "$output" | grep -E '^\s*(File|All files)\s*\|' | head -1)
        lines_col=$(echo "$header_line" | awk -F'|' '{ for (i=1; i<=NF; i++) { gsub(/[[:space:]]/, "", $i); if ($i == "%Lines") print i } }')
        if [ -z "$lines_col" ]; then
          lines_col=3
        fi
        line_coverage=$(echo "$all_files_line" | awk -F'|' -v col="$lines_col" '{gsub(/[[:space:]%]/, "", $col); print $col}')
        threshold=95
        pass=$(awk "BEGIN {print ($line_coverage >= $threshold) ? 1 : 0}")
        if [ "$pass" -eq 0 ]; then
          echo "Line coverage ${line_coverage}% is below the ${threshold}% threshold."
          exit 1
        fi
        echo "Coverage check passed: ${line_coverage}% (threshold: ${threshold}%)"
